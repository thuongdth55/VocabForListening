<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Deepen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>

      /* =========================
   READERA / PAPER STYLE
========================= */

:root{

    /* nền giấy */

    --bg:#e6d7c3;
    --bg-soft:#efe4d4;

    /* card */

    --card:#eadcc9;

    /* border */

    --border:#cdbba4;

    /* text */

    --text:#5b4636;
    --muted:#7a6757;

    /* accent */

    --accent:#8a6b4f;
    --accent-soft:#a07d5f;

    /* hover */

    --hover:#f2e7d8;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;

    font-family:
        "Georgia",
        "Times New Roman",
        serif;

    background:var(--bg);

    color:var(--text);

    height:100%;

    overflow:hidden;

    -webkit-font-smoothing:antialiased;

    text-rendering:optimizeLegibility;
}

/* =========================
   SCROLL
========================= */

#book{
    height:100vh;

    overflow-y:auto;

    -webkit-overflow-scrolling:touch;
}

/* =========================
   FLASHCARD
========================= */

.flashcard{
    min-height:100vh;

    padding:26px;

    padding-bottom:120px;

    display:flex;

    flex-direction:column;

    gap:18px;

    animation:fadeIn .25s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

/* =========================
   HEADER
========================= */

.header-section{
  :root{

/* ===== LOADING ===== */

#loading{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#0f172a;

    color:white;

    font-size:20px;

    z-index:10000;
}

/* ===== MOBILE ===== */

@media(max-width:700px){

    .flashcard{
        padding:18px;
        padding-bottom:130px;
    }

    .header-section{
        padding:22px;
    }

    .big-char{
        font-size:42px;
    }

    .ipa-text{
        font-size:16px;
    }

    .lang-link{
        font-size:18px;
    }
}
    background:var(--card);

    border:1px solid var(--border);

    border-radius:26px;

    padding:28px 26px;

    display:flex;

    flex-direction:column;

    gap:14px;

    box-shadow:
        0 2px 10px rgba(80,60,40,0.05);
}

.big-char{

    margin:0;

    font-weight:700;

    line-height:1.08;

    letter-spacing:-0.5px;

    color:var(--accent);

    font-size:clamp(34px,8vw,58px);

    overflow:hidden;

    word-break:keep-all;
}

.info-top{
    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

.ipa-box{
    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

.ipa-tag{

    padding:5px 12px;

    border-radius:999px;

    background:#dccab3;

    color:#6f5b49;

    font-size:12px;

    font-weight:600;

    letter-spacing:0.4px;
}

.ipa-text{

    color:#7b6754;

    font-size:18px;

    font-style:italic;
}

/* =========================
   SECTION TITLE
========================= */

.section-title{

    display:flex;

    align-items:center;

    gap:8px;

    font-weight:700;

    color:var(--accent);

    font-size:20px;

    margin-top:8px;
}

/* =========================
   COMMON CARD
========================= */

.meaning,
.verb-forms-section,
.examples-box,
.ext-vocab-item{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;
}

/* =========================
   MEANING
========================= */

.meaning{

    padding:18px 20px;

    line-height:1.9;

    font-size:21px;
}

/* =========================
   LINKS
========================= */

.lang-link{

    color:#6d7f91;

    text-decoration:none;

    font-weight:700;

    font-size:21px;
}

.lang-link:hover{
    opacity:0.75;
}

.spacing-left{
    margin-left:16px;
}

/* =========================
   VERB FORMS
========================= */

.verb-forms-section{

    padding:18px !important;

    background:#e8dac6 !important;

    border-left:5px solid #a07d5f !important;

    color:var(--text) !important;

    font-size:18px !important;

    line-height:1.8;
}

/* =========================
   EXAMPLES BOX
========================= */

.examples-box{
    padding:14px;
}

/* =========================
   VOCAB ITEM
========================= */

.ext-vocab-item{

    padding:18px;

    margin-bottom:14px;

    transition:0.2s;
}

.ext-vocab-item:hover{

    background:var(--hover);
}

.ext-en{

    font-weight:700;

    font-size:22px;

    line-height:1.75;

    margin-bottom:6px;
}

.ext-ipa{

    color:#8a7765;

    font-style:italic;

    margin-bottom:10px;

    font-size:17px;
}

.ext-vi{

    color:#5e4b3c;

    line-height:1.9;

    font-size:20px;
}

/* =========================
   SELECT
========================= */

#type-select,
#change-type-select{

    width:fit-content;

    padding:12px 16px;

    border-radius:16px;

    border:1px solid var(--border);

    background:#efe4d4;

    color:var(--text);

    font-size:15px;

    cursor:pointer;

    outline:none;
}

#change-type-select{

    background:#c7ae91;

    color:#4e3d30;

    font-weight:700;
}

/* =========================
   NAVIGATION
========================= */

.nav-control{

    position:fixed;

    bottom:18px;

    left:50%;

    transform:translateX(-50%);

    background:rgba(230,215,195,0.92);

    border:1px solid #ccb79d;

    padding:8px 14px;

    border-radius:999px;

    display:flex;

    align-items:center;

    gap:12px;

    z-index:9999;

    box-shadow:
        0 2px 10px rgba(80,60,40,0.08);
}

.nav-btn{

    border:none;

    background:none;

    color:#6e5845;

    font-size:18px;

    cursor:pointer;

    padding:2px 6px;

    line-height:1;
}

.nav-btn:hover{
    opacity:0.7;
}

.dots{

    display:flex;

    align-items:center;

    gap:5px;
}

.dot{

    width:6px;

    height:6px;

    border-radius:999px;

    background:#b9a58e;

    transition:0.2s;
}

.dot.active{

    width:16px;

    background:#8a6b4f;
}

/* =========================
   LOADING
========================= */

#loading{

    position:fixed;

    inset:0;

    background:var(--bg);

    display:flex;

    justify-content:center;

    align-items:center;

    color:var(--text);

    font-size:22px;

    z-index:10000;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    .flashcard{

        padding:20px;

        padding-bottom:120px;
    }

    .header-section{
        padding:24px 22px;
    }

    .big-char{
        font-size:clamp(30px,9vw,48px);
    }

    .meaning{
        font-size:20px;
    }

    .ext-en{
        font-size:20px;
    }

    .ext-vi{
        font-size:19px;
    }
}
    </style>
</head>
<body>

<div id="loading">Đang tải dữ liệu...</div>
<div id="book">
    </div>

<div class="nav-control">
    <button class="nav-btn" onpointerdown="prevPage()">←</button>
    <div id="pageDots" class="dots"></div>
    <button class="nav-btn" onpointerdown="nextPage()">→</button>
</div>
    
<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=1728781649&single=true&output=csv';
    const sheetVideoUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=0&single=true&output=csv';

    const params = new URLSearchParams(window.location.search);
    const numero = Number(params.get("no"));
    const selected_type = Number(params.get("type")) || 0;

    let allData = []; // Biến chính lưu trữ dữ liệu
    let currentIndex = 0;
    let totalItems = 0;

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Lọc dữ liệu
                // allData = results.data.filter(item => item['Status']?.trim() === selectedStatus);
                allData = results.data.filter(item => {
                        // Ép kiểu stage về số và trim Status để so sánh an toàn
                        const w_no = Number(item['No']);
                        const w_type = Number(item['type']);
                        const w = item['word']?.toString().trim();
                        // Dùng && (Logical AND) thay vì & (Bitwise)
                        return w_no === numero && w_type === selected_type && !!w;
                });
   
                // GIẢI PHÓNG BỘ NHỚ: Xóa kết quả gốc của PapaParse
                results = null; 

                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if (allData.length === 0) {
                    document.getElementById('book').innerHTML = '<div class="empty-state">Không có dữ liệu sẵn sàng.</div>';
                    return;
                }
                
                totalItems = allData.length;
                renderCard(currentIndex);
                createDots();
            }
        });
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
      }
    }
  
    // Hàm render ĐÚNG 1 CARD duy nhất
    function renderCard(index) {
        const book = document.getElementById('book');
        const item = allData[index];
        
        // Reset vị trí cuộn lên đầu card mới
        book.scrollTop = 0;

        const examplesHtml = generateVocabHtml(item['examples']);

        const currentType = String(item["type"]);

        const allTypes = ["0", "1", "2"];

        const availableTypes =
            allTypes.filter(t => t !== currentType);

        // Ghi đè toàn bộ nội dung cũ (Xóa card cũ khỏi DOM)
        book.innerHTML = `
            <div class="flashcard">
                <select id="type-select">
                    <option value="0">Type 0</option>
                    <option value="1">Type 1</option>
                    <option value="2">Type 2</option>
                </select>
                <div class="header-section" onclick="speak_en('${item['word']}')">
                    <h1 class="big-char">${item['word'] || '？'}</h1>
                    <div class="info-top">
                        <div class="ipa-box">
                            <span class="ipa-tag">IPA</span>
                            <span class="ipa-text">${item['ipa'] || ''}</span>
                        </div>
                    </div>
                </div>

                <div class="meaning">
                          Meaning: <a class="lang-link" href="${item['meaning_vi'] || '#'}">vi</a>
                                   <a class="lang-link spacing-left" href="${item['meaning_en'] || '#'}">en    </a>
                                   <link rel="stylesheet"
                                        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

                                    <a class="lang-link"  href="${item['video_link'] || '#'}"
                                        style="color: #ff0000; font-weight: bold; text-decoration: none;">
    
                                        <i class="fa-brands fa-youtube"></i>
                                    </a>

                                    <a class="lang-link spacing-left" href="morpheme.html?word=${item['word'] || '#'}">mor</a>
                </div>
                
                ${item['verb forms'] ? `
                    <div class="verb-forms-section" 
                    style="margin: 10px 0; padding: 10px 15px; background: #f8f9fa; border-radius: 10px; font-size: 13px; color: #555; text-align: left; border-left: 4px solid #3498db; cursor: pointer;"
                         onclick="event.stopPropagation(); speak_en('${item['verb forms'].replace(/'/g, "\\'")}')">
                        <strong>${item['verb forms']}</strong>
                    </div>
                ` : ''}

                <div class="section-title">⚡Sentence Examples</div>
                <div class="examples-box">${examplesHtml}</div>
                
                <select id="change-type-select">
                    <option value="">Chuyển trạng thái</option>

                        ${availableTypes.map(t =>
                    `<option value="${t}">Type ${t}</option>`
                    ).join("")}
                </select>
            </div>
        `;

        const typeSelect = document.getElementById("type-select");

        typeSelect.value = selected_type;

        typeSelect.addEventListener("change", () => {

            const params = new URLSearchParams(window.location.search);

            params.set("type", typeSelect.value);
            params.set("no", numero);

            window.location.search = params.toString();
        });

        const select = document.getElementById("change-type-select");

        select.addEventListener("change", async () => {

            const newType = select.value;

            if (!newType) return;
            const index_row = Number(item['stt'])+1
            const url ="https://script.google.com/macros/s/AKfycbxx6QI_5UZc5evIIPc2wTTFmWfLJBAl6dFurJNJ4oRT/exec" +
          `?row=${index_row}&type=${newType}`;

            console.log(index_row);
            console.log(newType);
            // window.open(url, "_blank");

            const iframe = document.createElement("iframe");

            iframe.style.display = "none";

            iframe.src = url;

            document.body.appendChild(iframe);

            item.type = newType;

            alert("Đã cập nhật");
        });

        const bigChar = document.querySelector(".big-char");

        if(bigChar){

            const textLength = bigChar.textContent.trim().length;

            if(textLength >= 22){
                bigChar.style.fontSize = "32px";
            }
            else if(textLength >= 18){
                bigChar.style.fontSize = "38px";
            }
            else if(textLength >= 14){
                bigChar.style.fontSize = "46px";
            }
        }
        
        updateDots();
    }
    
    function nextPage() {
        if (currentIndex < totalItems - 1) {
            currentIndex++;
            renderCard(currentIndex);
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard(currentIndex);
        }
    }

    function createDots() {
        const dotsContainer = document.getElementById('pageDots');
        dotsContainer.innerHTML = '';
        const limit = Math.min(totalItems, 5); 
        for (let i = 0; i < limit; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.onpointerdown = () => { currentIndex = i; renderCard(i); };
            dotsContainer.appendChild(dot);
        }
        updateDots();
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        const activeIdx = currentIndex % 5; // Giả lập vòng lặp 5 dots
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === activeIdx);
        });
    }

    function nl2br(text) { return text ? text.replace(/\\n/g, '<br>') : ''; }

    function parseExtendedVocab(text) {
        if (!text) return [];

        // Tách các mục lớn bằng số thứ tự (1., 2., ...)
        const sections = text.split(/(?=\d+\.\s+)/).filter(s => s.trim());

        return sections.map(section => {
            const cleanSection = section.replace(/^\d+\.\s*/, '').trim();
            const parts = cleanSection.split(/\s+-\s+/);

            // Hàm xử lý: Xóa "A:", "B:", "Tên:" và chuyển \n thành <br>
            const formatConversation = (str) => {
                if (!str) return '';
                return str
                    .replace(/\\n/g, '\n') // Chuẩn hóa \n
                    .split('\n')
                    .map(line => {
                        // Regex xóa các từ đứng trước dấu hai chấm ở đầu dòng (ví dụ A:, Person:, ...)
                        return line.replace(/^[A-Z][a-z]*:\s*/, '').trim();
                    })
                    .filter(line => line) // Bỏ dòng trống
                    .join('<br>'); // Nối lại bằng thẻ xuống dòng
            };

            return {
                en: formatConversation(parts[0]),
                ipa: formatConversation(parts[1]),
                vi: formatConversation(parts[2])
            };
        }).filter(v => v.en);
    }

    function speak_en(text) {
        if (!text) return;
    
        // Dừng các yêu cầu nói cũ
        window.speechSynthesis.cancel();

        // Làm sạch chuỗi: Thay / thành dấu phẩy để nghỉ nhịp, 
        // và đảm bảo các ký tự đặc biệt không gây lỗi
        const cleanText = text.replace(/\//g, ',');

        const utter = new SpeechSynthesisUtterance(cleanText);
        utter.lang = 'en-US';
    
        // Tùy chỉnh màu xanh dương cho tâm trạng vui vẻ
        utter.rate = 0.9; // Đọc chậm lại một chút cho rõ
    
        window.speechSynthesis.speak(utter);
    }

    function generateVocabHtml(rawData) {
        const list = parseExtendedVocab(rawData);
        if (!list.length) {
            return '<div style="font-size:12px;color:#999">Chưa có dữ liệu.</div>';
        }
    
        return list.map(v => `
            <div class="ext-vocab-item" onclick="event.stopPropagation(); speak_en('${v.en.replace(/'/g, "\\'")}')">
                <div class="ext-en">${v.en}</div>
                <div class="ext-ipa">${v.ipa}</div>
                <div class="ext-vi">${v.vi}</div>
            </div>
        `).join('');
    }
    init();
</script>
</body>
</html>
