<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Deepen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #00a86b;
            --secondary: #1a5fb4;
            --bg: #f2f2f7;
            --text: #2c3e50;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden; /* Chặn cuộn toàn trang để tránh lỗi nhảy lung tung */
            height: 100vh;
        }

        #book {
            height: 100vh;
            width: 100%;
            overflow-y: auto; /* Chỉ cho phép cuộn bên trong nội dung thẻ nếu thẻ quá dài */
            -webkit-overflow-scrolling: touch;
        }

        .flashcard {
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            padding-bottom: 120px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.3s ease; /* Hiệu ứng chuyển trang nhẹ nhàng */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
                         background: white; border: 2px solid var(--primary); 
                         border-radius: 20px; padding: 20px; 
                         display: flex;
                         flex-direction: column;   /* thêm */

                         justify-content: center;
                         align-items: flex-start;      /* thêm */

                         box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
                         gap: 20px; /* Tạo khoảng cách an toàn ở giữa */
                        }
        .big-char { font-size: 50px; font-weight: bold; margin: 0; line-height: 1; }
        .info-top {
                display: flex;
                flex-direction: column;
                text-align: left;      
                align-items: center;  /* sửa */
                text-align: center;   /* sửa */
                margin-left: 0;       /* bỏ auto */
        }
        .ipa-text {
                color: #e67e22; /* Màu cam đất (dễ nhìn) */
                font-weight: 500; /* Làm chữ đậm hơn một chút để nổi bật */
        }
        .ext-en { font-weight: bold }
        .ext-ipa  {color: #e67e22; }
        .spacing-left {
                /* 20px tương đương khoảng 4-5 dấu cách bình thường */
                margin-left: 18px; 
                text-decoration: none;
                color: #3498db;
                font-weight: bold;
        }
        .lang-link {
                color: #3498db;        /* Đổi màu text thành xanh dương */
                text-decoration: none; /* Bỏ gạch chân mặc định nếu muốn */
                font-weight: bold;     /* Làm chữ đậm cho dễ bấm */
                font-size: 23px;
        }
        .section-title { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--secondary); margin-top: 5px; }
        .component-box { background: white; border-left: 6px solid #ff9f43; border-radius: 12px; padding: 15px; }
        .total-strokes { background: #e1f5fe; color: var(--primary); text-align: center; padding: 10px; border-radius: 10px; font-weight: bold; }
        .mnemonic-grid {
                display: block; /* Chuyển về dạng khối thông thường */
                width: 100%;
                margin-bottom: 15px; /* Khoảng cách với phần nội dung bên dưới */
        }
        .mnemonic-text { background: #fff9db; padding: 15px; border-radius: 15px; font-size: 13px; line-height: 1.5; }
        .mnemonic-img {
            width: 100%; 
            /* Thay đổi chiều cao từ 120px thành auto hoặc một con số lớn hơn để ảnh hiển thị rõ nét hơn khi đứng một mình */
            height: auto; 
            max-height: 400px; /* Giới hạn chiều cao tối đa để không choán hết màn hình */
    
            object-fit: contain; /* Dùng contain để thấy toàn bộ ảnh mà không bị mất góc */
            border-radius: 15px;
            background: #eee;
            display: block;
        }
        .stroke-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: white; padding: 10px; border-radius: 15px; }
        .stroke-item { width: 100%; aspect-ratio: 1/1; object-fit: contain; }
        
        /* Nav Control tối ưu cho Android */
        .nav-control {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 9999;
        }

        .nav-btn { 
            background: none; border: none; font-size: 24px; cursor: pointer; color: #333; 
            touch-action: manipulation; padding: 5px 15px;
        }
        
        .dots { display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        .ext-vocab-item { background: #f9fafb; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .ext-vocab-item:hover {
                background-color: #f0f7ff; /* Màu xanh dương cực nhạt */
                border-left: 3px solid #1E90FF; /* Thanh nhấn màu xanh dương bên trái */
                border-radius: 8px;
        }
        .fa-youtube{
                color:#ff0000;
                font-size:22px;
        }
        #type-select{
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            cursor: pointer;
        }

        #change-type-select{
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            cursor: pointer;
            background-color: #166534; /* xanh */
            color: white;              /* chữ trắng */
        }
        .ext-han { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: bold; }
        .ext-pinyin { font-size: 14px; color: var(--primary); }
        .speak-btn { background: none; border: 1px solid #eee; border-radius: 50%; cursor: pointer; }
        #loading { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="loading">Đang tải dữ liệu...</div>
<div id="book">
    </div>

<div class="nav-control">
    <button class="nav-btn" onpointerdown="prevPage()">←</button>
    <div id="pageDots" class="dots"></div>
    <button class="nav-btn" onpointerdown="nextPage()">→</button>
</div>
    
<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=1728781649&single=true&output=csv';
    const sheetVideoUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=0&single=true&output=csv';

    const params = new URLSearchParams(window.location.search);
    const numero = Number(params.get("no"));
    const selected_type = Number(params.get("type")) || 0;

    let allData = []; // Biến chính lưu trữ dữ liệu
    let currentIndex = 0;
    let totalItems = 0;

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Lọc dữ liệu
                // allData = results.data.filter(item => item['Status']?.trim() === selectedStatus);
                allData = results.data.filter(item => {
                        // Ép kiểu stage về số và trim Status để so sánh an toàn
                        const w_no = Number(item['No']);
                        const w_type = Number(item['type']);
                        const w = item['word']?.toString().trim();
                        // Dùng && (Logical AND) thay vì & (Bitwise)
                        return w_no === numero && w_type === selected_type && !!w;
                });
   
                // GIẢI PHÓNG BỘ NHỚ: Xóa kết quả gốc của PapaParse
                results = null; 

                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if (allData.length === 0) {
                    document.getElementById('book').innerHTML = '<div class="empty-state">Không có dữ liệu sẵn sàng.</div>';
                    return;
                }
                
                totalItems = allData.length;
                renderCard(currentIndex);
                createDots();
            }
        });
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
      }
    }
  
    // Hàm render ĐÚNG 1 CARD duy nhất
    function renderCard(index) {
        const book = document.getElementById('book');
        const item = allData[index];
        
        // Reset vị trí cuộn lên đầu card mới
        book.scrollTop = 0;

        const examplesHtml = generateVocabHtml(item['examples']);

        const currentType = String(item["type"]);

        const allTypes = ["0", "1", "2"];

        const availableTypes =
            allTypes.filter(t => t !== currentType);

        // Ghi đè toàn bộ nội dung cũ (Xóa card cũ khỏi DOM)
        book.innerHTML = `
            <div class="flashcard">
                <select id="type-select">
                    <option value="0">Type 0</option>
                    <option value="1">Type 1</option>
                    <option value="2">Type 2</option>
                </select>
                <div class="header-section" onclick="speak_en('${item['word']}')">
                    <h1 class="big-char">${item['word'] || '？'}</h1>
                    <div class="info-top">
                        <div class="ipa-box">
                            <span class="ipa-tag">IPA</span>
                            <span class="ipa-text">${item['ipa'] || ''}</span>
                        </div>
                    </div>
                </div>

                <div class="meaning">
                          Meaning: <a class="lang-link" href="${item['meaning_vi'] || '#'}">vi</a>
                                   <a class="lang-link spacing-left" href="${item['meaning_en'] || '#'}">en    </a>
                                   <link rel="stylesheet"
                                        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

                                    <a class="lang-link"  href="${item['video_link'] || '#'}"
                                        style="color: #ff0000; font-weight: bold; text-decoration: none;">
    
                                        <i class="fa-brands fa-youtube"></i>
                                    </a>

                                    <a class="lang-link spacing-left" href="morpheme.html?word=${item['word'] || '#'}">mor</a>
                </div>
                
                ${item['verb forms'] ? `
                    <div class="verb-forms-section" 
                    style="margin: 10px 0; padding: 10px 15px; background: #f8f9fa; border-radius: 10px; font-size: 13px; color: #555; text-align: left; border-left: 4px solid #3498db; cursor: pointer;"
                         onclick="event.stopPropagation(); speak_en('${item['verb forms'].replace(/'/g, "\\'")}')">
                        <strong>${item['verb forms']}</strong>
                    </div>
                ` : ''}

                <div class="section-title">⚡Sentence Examples</div>
                <div style="background:white; padding:15px; border-radius:15px;">${examplesHtml}</div>
                
                <select id="change-type-select">
                    <option value="">Chuyển trạng thái</option>

                        ${availableTypes.map(t =>
                    `<option value="${t}">Type ${t}</option>`
                    ).join("")}
                </select>
            </div>
        `;

        const typeSelect = document.getElementById("type-select");

        typeSelect.value = selected_type;

        typeSelect.addEventListener("change", () => {

            const params = new URLSearchParams(window.location.search);

            params.set("type", typeSelect.value);
            params.set("no", numero);

            window.location.search = params.toString();
        });

        const select = document.getElementById("change-type-select");

        select.addEventListener("change", async () => {

            const newType = select.value;

            if (!newType) return;
            const index_row = Number(item['stt'])+1
            const url ="https://script.google.com/macros/s/AKfycbxx6QI_5UZc5evIIPc2wTTFmWfLJBAl6dFurJNJ4oRT/exec" +
          `?row=${index_row}&type=${newType}`;

            console.log(index_row);
            console.log(newType);
            // window.open(url, "_blank");

            const iframe = document.createElement("iframe");

            iframe.style.display = "none";

            iframe.src = url;

            document.body.appendChild(iframe);

            item.type = newType;

            alert("Đã cập nhật");
        });
        
        updateDots();
    }
    
    function nextPage() {
        if (currentIndex < totalItems - 1) {
            currentIndex++;
            renderCard(currentIndex);
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard(currentIndex);
        }
    }

    function createDots() {
        const dotsContainer = document.getElementById('pageDots');
        dotsContainer.innerHTML = '';
        const limit = Math.min(totalItems, 5); 
        for (let i = 0; i < limit; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.onpointerdown = () => { currentIndex = i; renderCard(i); };
            dotsContainer.appendChild(dot);
        }
        updateDots();
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        const activeIdx = currentIndex % 5; // Giả lập vòng lặp 5 dots
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === activeIdx);
        });
    }

    function nl2br(text) { return text ? text.replace(/\\n/g, '<br>') : ''; }

    function parseExtendedVocab(text) {
        if (!text) return [];

        // Tách các mục lớn bằng số thứ tự (1., 2., ...)
        const sections = text.split(/(?=\d+\.\s+)/).filter(s => s.trim());

        return sections.map(section => {
            const cleanSection = section.replace(/^\d+\.\s*/, '').trim();
            const parts = cleanSection.split(/\s+-\s+/);

            // Hàm xử lý: Xóa "A:", "B:", "Tên:" và chuyển \n thành <br>
            const formatConversation = (str) => {
                if (!str) return '';
                return str
                    .replace(/\\n/g, '\n') // Chuẩn hóa \n
                    .split('\n')
                    .map(line => {
                        // Regex xóa các từ đứng trước dấu hai chấm ở đầu dòng (ví dụ A:, Person:, ...)
                        return line.replace(/^[A-Z][a-z]*:\s*/, '').trim();
                    })
                    .filter(line => line) // Bỏ dòng trống
                    .join('<br>'); // Nối lại bằng thẻ xuống dòng
            };

            return {
                en: formatConversation(parts[0]),
                ipa: formatConversation(parts[1]),
                vi: formatConversation(parts[2])
            };
        }).filter(v => v.en);
    }

    function speak_en(text) {
        if (!text) return;
    
        // Dừng các yêu cầu nói cũ
        window.speechSynthesis.cancel();

        // Làm sạch chuỗi: Thay / thành dấu phẩy để nghỉ nhịp, 
        // và đảm bảo các ký tự đặc biệt không gây lỗi
        const cleanText = text.replace(/\//g, ',');

        const utter = new SpeechSynthesisUtterance(cleanText);
        utter.lang = 'en-US';
    
        // Tùy chỉnh màu xanh dương cho tâm trạng vui vẻ
        utter.rate = 0.9; // Đọc chậm lại một chút cho rõ
    
        window.speechSynthesis.speak(utter);
    }

    function generateVocabHtml(rawData) {
        const list = parseExtendedVocab(rawData);
        if (!list.length) {
            return '<div style="font-size:12px;color:#999">Chưa có dữ liệu.</div>';
        }
    
        return list.map(v => `
            <div class="ext-vocab-item" onclick="event.stopPropagation(); speak_en('${v.en.replace(/'/g, "\\'")}')">
                <div class="ext-en">${v.en}</div>
                <div class="ext-ipa">${v.ipa}</div>
                <div class="ext-vi">${v.vi}</div>
            </div>
        `).join('');
    }
    init();
</script>
</body>
</html>
