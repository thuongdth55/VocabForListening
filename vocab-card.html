<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Deepen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
    :root{

    /* =========================
       READERA / PAPER PALETTE
    ========================= */

    --bg1:#e6d7c3;
    --bg2:#efe4d4;

    --card:#eadcc9;
    --border:#cdbba4;

    --text:#5b4636;
    --muted:#7a6757;

    --gold:#8a6b4f;
    --orange:#a07d5f;

    --blue:#6d7f91;

    --hover:#f2e7d8;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;

    font-family:
        "Georgia",
        "Times New Roman",
        serif;

    background:
        radial-gradient(circle at top left,var(--bg2),var(--bg1) 65%);

    color:var(--text);

    height:100%;

    overflow:hidden;

    -webkit-font-smoothing:antialiased;

    text-rendering:optimizeLegibility;
}

/* =========================
   SCROLL
========================= */

#book{
    height:100vh;

    overflow-y:auto;

    -webkit-overflow-scrolling:touch;
}

/* =========================
   FLASHCARD
========================= */

.flashcard{

    min-height:100vh;

    padding:26px;

    padding-bottom:140px;

    display:flex;

    flex-direction:column;

    gap:18px;

    animation:fadeIn .28s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   HERO
========================= */

.header-section{

    background:
        linear-gradient(
            135deg,
            #eadcc9,
            #e2d1bd
        );

    border:1px solid var(--border);

    border-radius:28px;

    padding:28px;

    box-shadow:
        0 4px 18px rgba(80,60,40,0.06);

    display:flex;

    flex-direction:column;

    gap:18px;
}

.big-char{
    min-width:0;
    max-width:100%;
    margin:0;
    font-weight:900;

    line-height:1.2;

    letter-spacing:-1.3px;

    font-size: 60px;
    /* font-size:clamp(40px,8vw,64px); */

    background:
        linear-gradient(
            135deg,
            #6b9f5f 0%,
            #5b8f52 24%,
            #467a42 62%,
            #2f5a32 100%
        );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    filter:
        saturate(1.03)
        contrast(1.05)
        drop-shadow(0 2px 2px rgba(30,55,28,0.10))
        drop-shadow(0 8px 18px rgba(25,45,24,0.15));

    text-shadow:

        0 1px 0 rgba(255,255,255,0.12),

        0 2px 4px rgba(24,42,20,0.18),

        0 6px 14px rgba(18,32,16,0.15);

    -webkit-text-stroke:
        0.35px rgba(255,255,255,0.08);

    position:relative;
}
        
.big-char::-webkit-scrollbar{
    height:6px;
}

.big-char::-webkit-scrollbar-thumb{

    background:rgba(120,90,60,0.25);

    border-radius:999px;
}

.info-top{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

.ipa-box{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

.ipa-tag{

    padding:5px 12px;

    border-radius:999px;

    background:#dccab3;

    color:#6f5b49;

    font-size:12px;

    font-weight:600;

    letter-spacing:0.4px;
}

.ipa-text{

    /* color:#7b6754; */
    color: #4f5f73;

    font-size:18px;

    font-style:italic;
}

/* =========================
   COMMON CARD
========================= */

.section-title{

    display:flex;

    align-items:center;

    gap:10px;

    color:var(--gold);

    font-weight:700;

    font-size:20px;

    margin-top:8px;
}

.meaning,
.verb-forms-section,
.examples-box,
.ext-vocab-item{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:22px;
}

/* =========================
   MEANING
========================= */

.meaning{

    padding:18px 20px;

    line-height:1.9;

    font-size:21px;
}

/* =========================
   LINKS
========================= */

.lang-link{

    color:var(--blue);

    text-decoration:none;

    font-weight:700;

    font-size:21px;
}

.spacing-left{
    margin-left:16px;
}

.lang-link:hover{
    opacity:0.75;
}

/* =========================
   VERB FORMS
========================= */

.verb-forms-section{

    padding:18px !important;

    color:var(--text) !important;

    background:#e8dac6 !important;

    border-left:5px solid var(--gold) !important;

    line-height:1.8;

    font-size:18px;
}

/* =========================
   EXAMPLES
========================= */

.examples-box{
    padding:14px;
}

.ext-vocab-item{

    padding:18px;

    margin-bottom:14px;

    transition:0.22s;
}

.ext-vocab-item:hover{

    transform:translateY(-1px);

    background:var(--hover);

    border-color:#c3af95;
}

.ext-en{

    font-weight:700;

    font-size:22px;

    line-height:1.75;

    margin-bottom:6px;
}

.ext-ipa{

    color:#8a7765;
    /* color:#52606d; */
    
    font-style:italic;

    margin-bottom:10px;

    font-size:17px;
}

.ext-vi{

    color:#5e4b3c;

    line-height:1.9;

    font-size:20px;
}

/* =========================
   SELECT
========================= */

#type-select,
#group-select,
#change-type-select{

    width:fit-content;

    padding:12px 16px;

    border-radius:16px;

    border:1px solid var(--border);

    background:#efe4d4;
    
    color:var(--text);

    font-size:15px;

    cursor:pointer;

    outline:none;

    font-family:
        "Georgia",
        "Times New Roman",
        serif;
}

#change-type-select{

    /* background:
        linear-gradient(
            135deg,
            #c7ae91,
            #b99673
        ); */

    background:
    linear-gradient(
        135deg,
        #6ea85f,
        #467a42
    );

    border:none;

    /* color:#4e3d30; */
    color: #f7f1e8;
    font-weight:700;
}

.image-strip{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin-bottom:10px;
    padding-bottom:4px;

    scroll-snap-type:x proximity;

    /* Ẩn thanh cuộn */
    scrollbar-width:none;
    -ms-overflow-style:none;
}

.image-strip::-webkit-scrollbar{
    display:none;
}

.image-strip img{
    flex:0 0 auto;
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:8px;
    scroll-snap-align:start;
}
        
/* =========================
   NAV
========================= */

.nav-control{

    position:fixed;

    bottom:18px;

    left:50%;

    transform:translateX(-50%);

    background:rgba(230,215,195,0.92);

    border:1px solid #ccb79d;

    backdrop-filter:blur(10px);

    padding:8px 14px;

    border-radius:999px;

    display:flex;

    align-items:center;

    gap:12px;

    z-index:9999;

    box-shadow:
        0 2px 10px rgba(80,60,40,0.08);
}

.nav-btn{

    border:none;

    background:none;

    color:#6e5845;

    font-size:18px;

    cursor:pointer;

    padding:2px 6px;

    line-height:1;

    opacity:0.9;
}

.nav-btn:hover{
    opacity:0.7;
}

.dots{

    display:flex;

    align-items:center;

    gap:5px;
}

.dot{

    width:6px;

    height:6px;

    border-radius:999px;

    background:#b9a58e;

    transition:0.22s;
}

.dot.active{

    width:16px;

    background:
        linear-gradient(
            90deg,
            #8a6b4f,
            #a07d5f
        );
}

/* =========================
   LOADING
========================= */

#loading{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:var(--bg1);

    color:var(--text);

    font-size:22px;

    z-index:10000;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    .flashcard{

        padding:20px;

        padding-bottom:130px;
    }

    .header-section{
        padding:24px 22px;
    }

    .big-char{
        font-size:clamp(40px,9vw,50px);
    }

    .big-char.small{
    font-size:clamp(24px,6vw,32px);
}

.big-char.medium{
    font-size:clamp(28px,7vw,38px);
}

.big-char.large{
    font-size:clamp(34px,8vw,46px);
}

    .ipa-text{
        font-size:16px;
    }

    .lang-link{
        font-size:19px;
    }

    .meaning{
        font-size:20px;
    }

    .ext-en{
        font-size:20px;
    }

    .ext-vi{
        font-size:19px;
    }
}
    </style>
</head>
<body>

<div id="loading">Đang tải dữ liệu...</div>
<div id="book">
    </div>

<div class="nav-control">
    <button class="nav-btn" onpointerdown="prevPage()">←</button>
    <div id="pageDots" class="dots"></div>
    <button class="nav-btn" onpointerdown="nextPage()">→</button>
</div>
    
<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=1728781649&single=true&output=csv';
    const sheetVideoUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn1zBA3uJNHwy2J26AduUPdSPsT7JT7yP1oruiCRNp2C_dJwAHmMV-wl1unwHogdBk3LICU_k1hJrk/pub?gid=0&single=true&output=csv';

    const params = new URLSearchParams(window.location.search);
    const numero = Number(params.get("no"));
    const selected_type = Number(params.get("type")) || 0;
    const selected_group = Number(params.get("group")) || 0;

    let allData = []; // Biến chính lưu trữ dữ liệu
    let allGroups = [];
    let currentIndex = 0;
    let totalItems = 0;

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Lọc dữ liệu
                // Lọc theo No + Type trước
                const baseData = results.data.filter(item => {
                    const w_no = Number(item['No']);
                    const w_type = Number(item['type']);
                    const w = item['word']?.toString().trim();

                    if (selected_type  === -1){
                       return w_no === numero && !!w;
                    }
                        
                    return w_no === numero &&
                       w_type === selected_type &&
                       !!w;
                });

                // Lấy tất cả group khác nhau
                allGroups = [...new Set(
                    baseData
                        .map(item => item['group'])
                        .filter(g => g !== undefined && g !== null && g !== "")
                        .map(g => Number(g))
                    )].sort((a, b) => a - b);

                // Lọc tiếp theo group
                // Nếu chọn All Groups thì giữ nguyên
                if (selected_group === 0) {
                    allData = baseData;
                } else {
                    allData = baseData.filter(item => {
                        const w_group = item['group'] ? Number(item['group']) : -1;
                        return w_group === selected_group;
                    });
                }
                
                // GIẢI PHÓNG BỘ NHỚ: Xóa kết quả gốc của PapaParse
                results = null; 

                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if (allData.length === 0) {
                    document.getElementById('book').innerHTML = '<div class="empty-state">Không có dữ liệu sẵn sàng.</div>';
                    return;
                }
                
                totalItems = allData.length;
                renderCard(currentIndex);
                createDots();
            }
        });
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
      }
    }
  
    // Hàm render ĐÚNG 1 CARD duy nhất
    function renderCard(index) {
        const book = document.getElementById('book');
        const item = allData[index];
        
        // Reset vị trí cuộn lên đầu card mới
        book.scrollTop = 0;

        const examplesHtml = generateVocabHtml(item['examples']);

        const currentType = String(item["type"]);

        const allTypes = ["0", "1", "2"];

        const availableTypes =
            allTypes.filter(t => t !== currentType);

        let groupCount = allData.length;

        // Ghi đè toàn bộ nội dung cũ (Xóa card cũ khỏi DOM)
        book.innerHTML = `
            <div class="flashcard">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <select id="type-select">
                        <option value="-1">All</option>
                        <option value="0">Type 0</option>
                        <option value="1">Type 1</option>
                        <option value="2">Type 2</option>
                    </select>

                    <select id="group-select">
                        <option value="0">All Groups</option>
                            ${allGroups.map(g => `
                        <option value="${g}">Group ${g}</option>
                        `).join("")}
                    </select>

                    <div style="margin:2px 0; font-size:13px; color:#666; text-align:left;">
                        <span style="color:green; font-weight:bold;">${index + 1}</span> / ${groupCount}
                    </div>
                </div>

                ${
                    item['image1'] ? `
                    <div class="image-strip">
                        ${[1,2,3,4,5,6].map(i =>
                            item[`image${i}`]
                                ? `<img src="${item[`image${i}`]}" loading="lazy">`
                                : ""
                        ).join("")}
                    </div>
                    ` : ""
                }
        
                <div class="header-section" onclick="speak_en('${item['word']}')">
                    <h1 class="big-char">${item['word'] || '？'}</h1>
                    <div class="info-top">
                        <div class="ipa-box">
                            <span class="ipa-tag">IPA</span>
                            <span class="ipa-text">${item['ipa'] || ''}</span>
                        </div>
                    </div>
                </div>

                <div class="meaning">
                          Meaning: <a class="lang-link" href="${item['meaning_vi'] || '#'}">vi</a>
                                   <a class="lang-link spacing-left" href="${item['meaning_en'] || '#'}">en    </a>
                                   <link rel="stylesheet"
                                        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

                                    <a class="lang-link"  href="${item['video_link'] || '#'}"
                                        style="color: #ff0000; font-weight: bold; text-decoration: none;">
    
                                        <i class="fa-brands fa-youtube"></i>
                                    </a>

                                    ${item['hasMorpheme'] == 1 
                                            ? `<a class="lang-link" href="morpheme.html?word=${item['word'] || '#'}">mor</a>` 
                                            : ''
                                    }
                                    <div class="ext-vi">${item['meaning'].replace(/\n/g, '<br>')}</div>
                </div>
                
                ${item['verb forms'] ? `
                    <div class="verb-forms-section" 
                    style="margin: 10px 0; padding: 10px 15px; background: #f8f9fa; border-radius: 10px; font-size: 13px; color: #555; text-align: left; border-left: 4px solid #3498db; cursor: pointer;"
                         onclick="event.stopPropagation(); speak_en('${item['verb forms'].replace(/'/g, "\\'")}')">
                        <strong>${item['verb forms']}</strong>
                    </div>
                ` : ''}

                <div class="section-title">⚡Sentence Examples</div>
                <div class="examples-box">${examplesHtml}</div>
                
                <select id="change-type-select">
                    <option value="">Chuyển trạng thái</option>

                        ${availableTypes.map(t =>
                    `<option value="${t}">Type ${t}</option>`
                    ).join("")}
                </select>
            </div>
        `;
        speak_en(item['word']);
        fitBigChar();

        window.addEventListener("resize",fitBigChar);

        const typeSelect = document.getElementById("type-select");

        typeSelect.value = selected_type;

        typeSelect.addEventListener("change", () => {

            const params = new URLSearchParams(window.location.search);

            params.set("type", typeSelect.value);
            params.set("no", numero);

            window.location.search = params.toString();
        });

        const groupSelect = document.getElementById("group-select");
        
        groupSelect.value = selected_group;

        groupSelect.addEventListener("change", () => {
            const params = new URLSearchParams(window.location.search);

            params.set("type", typeSelect.value);
            params.set("no", numero);
            params.set("group", groupSelect.value);
            
            window.location.search = params.toString();
        });

        // console.log("selected_group =", selected_group);
        // console.log(
        //     [...groupSelect.options].map(o => ({
        //         text: o.text,
        //         value: o.value
        //     }))
        // );

        const select = document.getElementById("change-type-select");

        select.addEventListener("change", async () => {

            const newType = select.value;

            if (!newType) return;
            const index_row = Number(item['stt'])+1
            const url ="https://script.google.com/macros/s/AKfycbxx6QI_5UZc5evIIPc2wTTFmWfLJBAl6dFurJNJ4oRT/exec" +
          `?row=${index_row}&type=${newType}`;

            // console.log(index_row);
            // console.log(newType);
            // window.open(url, "_blank");

            const iframe = document.createElement("iframe");

            iframe.style.display = "none";

            iframe.src = url;

            document.body.appendChild(iframe);

            item.type = newType;

            alert("Đã cập nhật");
        });
   
        updateDots();
    }
    
    function nextPage() {
        if (currentIndex < totalItems - 1) {
            currentIndex++;
            renderCard(currentIndex);
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard(currentIndex);
        }
    }

    function createDots() {
        const dotsContainer = document.getElementById('pageDots');
        dotsContainer.innerHTML = '';
        const limit = Math.min(totalItems, 5); 
        for (let i = 0; i < limit; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.onpointerdown = () => { currentIndex = i; renderCard(i); };
            dotsContainer.appendChild(dot);
        }
        updateDots();
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        const activeIdx = currentIndex % 5; // Giả lập vòng lặp 5 dots
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === activeIdx);
        });
    }

    function nl2br(text) { return text ? text.replace(/\\n/g, '<br>') : ''; }

    function parseExtendedVocab(text) {
        if (!text) return [];

        // Tách các mục lớn bằng số thứ tự (1., 2., ...)
        const sections = text.split(/(?=\d+\.\s+)/).filter(s => s.trim());

        return sections.map(section => {
            const cleanSection = section.replace(/^\d+\.\s*/, '').trim();
            const parts = cleanSection.split(/\s+-\s+/);

            // Hàm xử lý: Xóa "A:", "B:", "Tên:" và chuyển \n thành <br>
            const formatConversation = (str) => {
                if (!str) return '';
                return str
                    .replace(/\\n/g, '\n') // Chuẩn hóa \n
                    .split('\n')
                    .map(line => {
                        // Regex xóa các từ đứng trước dấu hai chấm ở đầu dòng (ví dụ A:, Person:, ...)
                        return line.replace(/^[A-Z][a-z]*:\s*/, '').trim();
                    })
                    .filter(line => line) // Bỏ dòng trống
                    .join('<br>'); // Nối lại bằng thẻ xuống dòng
            };

            return {
                en: formatConversation(parts[0]),
                ipa: formatConversation(parts[1]),
                vi: formatConversation(parts[2])
            };
        }).filter(v => v.en);
    }

    function speak_en(text) {
        if (!text) return;
    
        // Dừng các yêu cầu nói cũ
        window.speechSynthesis.cancel();

        // Làm sạch chuỗi: Thay / thành dấu phẩy để nghỉ nhịp, 
        // và đảm bảo các ký tự đặc biệt không gây lỗi
        const cleanText = text.replace(/\//g, ',');

        const utter = new SpeechSynthesisUtterance(cleanText);
        utter.lang = 'en-US';
    
        // Tùy chỉnh màu xanh dương cho tâm trạng vui vẻ
        utter.rate = 0.9; // Đọc chậm lại một chút cho rõ
    
        window.speechSynthesis.speak(utter);
    }

    function generateVocabHtml(rawData) {
        const list = parseExtendedVocab(rawData);
        if (!list.length) {
            return '<div style="font-size:12px;color:#999">Chưa có dữ liệu.</div>';
        }
    
        return list.map(v => `
            <div class="ext-vocab-item" onclick="event.stopPropagation(); speak_en('${v.en.replace(/'/g, "\\'")}')">
                <div class="ext-en">${v.en}</div>
                <div class="ext-ipa">${v.ipa}</div>
                <div class="ext-vi">${v.vi}</div>
            </div>
        `).join('');
    }

function fitBigChar(){

    const bigChar = document.querySelector(".big-char");
    const container = document.querySelector(".header-section");

    if(!bigChar || !container) return;

    const measure = document.createElement("span");

    measure.style.position = "absolute";
    measure.style.visibility = "hidden";
    measure.style.whiteSpace = "nowrap";

    measure.style.fontWeight =
        getComputedStyle(bigChar).fontWeight;

    measure.style.letterSpacing =
        getComputedStyle(bigChar).letterSpacing;

    measure.style.fontFamily =
        getComputedStyle(bigChar).fontFamily;

    measure.textContent = bigChar.textContent;

    document.body.appendChild(measure);

    let fontSize = 64;

    const maxWidth = container.clientWidth - 56;

    while(fontSize > 20){

        measure.style.fontSize = fontSize + "px";

        if(measure.offsetWidth <= maxWidth){
            break;
        }

        fontSize--;
    }

    bigChar.style.fontSize = fontSize + "px";

    measure.remove();
}
    
    init();
</script>
</body>
